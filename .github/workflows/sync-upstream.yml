name: Sync upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch and merge upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Aethersailor/Custom_OpenClash_Rules.git
          git fetch upstream main
          before_merge="$(git rev-parse HEAD)"
          git merge --no-edit upstream/main
          if [ "$before_merge" != "$(git rev-parse HEAD)" ]; then
            git restore --source="$before_merge" --staged --worktree .github/workflows
            if ! git diff --cached --quiet; then
              git commit --amend --no-edit
            fi
          fi
          git push origin main
